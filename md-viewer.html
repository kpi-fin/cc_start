<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Markdown Viewer</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
     
      font-family: Arial;
      background: #0b0f14;
      color: #eee;
      padding: 40px;
      max-width: 900px;
      margin: auto;
      line-height: 1.6;
    }

    h1, h2, h3 { color: #22c55e; }

    pre {
      background: #111;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
    }

    code {
      color: #22c55e;
    }

    a { color: #3b82f6; }

    .back-floating {
      position: fixed;
      top: 20px;
      left: 20px;
      background: #111827;
      border: 1px solid #22c55e;
      color: #22c55e;
      padding: 10px 14px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 18px;
      transition: 0.2s;
      z-index: 1000;
    }

.back-floating:hover {
  background: #22c55e;
  color: black;
}
  </style>
</head>

<body>

<a href="index.html" class="back-floating">←</a>
  
<div id="content">Loading...</div>

<script>
const params = new URLSearchParams(window.location.search);
const file = params.get("file");

fetch(file)
  .then(res => res.text())
  .then(md => {
    document.getElementById("content").innerHTML = marked.parse(md);
  });
</script>

</body>
</html>
